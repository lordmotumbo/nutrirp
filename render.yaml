services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: nutrirp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        value: 6e16b538b5a7eedd07fcee81a64a29b55807174972dc087be4fef58237f3a31b
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Banco no disco persistente — sobrevive a deploys e restarts
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/nutrirp.db
      # Email SMTP — configure com suas credenciais
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""
      # Cron secret para endpoints de disparo automático
      - key: CRON_SECRET
        value: nutrirp-cron-secret-2024
    disk:
      name: nutrirp-db
      mountPath: /opt/render/project/src
      sizeGB: 1

  # ── Frontend (React/Vite → Static Site) ───────────────────────────
  - type: web
    name: nutrirp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
