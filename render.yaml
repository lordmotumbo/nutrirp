services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: nutrirp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Banco no disco persistente — sobrevive a deploys e restarts
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/nutrirp.db
    disk:
      name: nutrirp-db
      mountPath: /opt/render/project/src
      sizeGB: 1

  # ── Frontend (React/Vite → Static Site) ───────────────────────────
  - type: web
    name: nutrirp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
