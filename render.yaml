services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: nutrirp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        value: sqlite:///./nutrirp.db
    disk:
      name: nutrirp-db
      mountPath: /opt/render/project/src
      sizeGB: 1

  # ── Frontend (React/Vite → Static Site) ───────────────────────────
  # IMPORTANTE: após o deploy do backend, defina a variável de ambiente
  # VITE_API_URL = https://nutrirp-backend.onrender.com/api
  # no painel do Render para o serviço nutrirp-frontend
  - type: web
    name: nutrirp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
